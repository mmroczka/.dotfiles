- defaults:
    link:
      relink: true
      force: true

- clean: ['~']

- create:
    - ~/.config
    - ~/.config/nvim/lua
    # - ~/.ssh/config
    - ~/.hammerspoon/Spoons
    - ~/.config/sketchybar/plugins
    - ~/.config/borders
    - ~/Library/Application Support/Übersicht/widgets

- link:
    ~/.zshrc: zshrc
    ~/.gitconfig: gitconfig
    ~/.gitignore: gitignore
    ~/.config/karabiner: karabiner
    ~/.hammerspoon: hammerspoon
    ~/.aliases: aliases
    ~/.wezterm.lua: wezterm.lua
    ~/.p10k.zsh: p10k.zsh
    ~/.config/fish/:
        glob: true
        path: fish/**
        create: true
    ~/.config/nvim: nvim
    ~/.aerospace.toml: aerospace.toml
    ~/.config/sketchybar: sketchybar
    ~/.config/borders/bordersrc: borders/bordersrc
    ~/Library/Application Support/Übersicht/widgets/aerospace-workspaces.jsx: ubersicht/aerospace-workspaces.jsx
    ~/.tmux.conf: tmux.conf
    ~/.tmux/plugins/tpm:
        path: tpm
        create: true
