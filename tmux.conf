# Prefix
set -g prefix C-b
bind C-b send-prefix

# General settings
set -g mouse on
set -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -sg escape-time 0
set -g focus-events on
set-option -g default-shell "/usr/local/bin/fish"

# Terminal colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

# Seamless nvim/tmux navigation
set -g @plugin 'aserowy/tmux.nvim'
set -g @tmux-nvim-navigation true
set -g @tmux-nvim-navigation-cycle true
set -g @tmux-nvim-navigation-keybinding-left 'C-h'
set -g @tmux-nvim-navigation-keybinding-down 'C-j'
set -g @tmux-nvim-navigation-keybinding-up 'C-k'
set -g @tmux-nvim-navigation-keybinding-right 'C-l'
set -g @tmux-nvim-resize false

# Resize panes (matches AeroSpace: - shrink, = grow, + balance)
bind-key -n M-- resize-pane -D 5 \; resize-pane -R 10
bind-key -n M-= resize-pane -U 5 \; resize-pane -L 10
bind-key -n M-+ select-layout -E

# Yanking / copy mode
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe'
bind [ copy-mode
bind -T copy-mode-vi i send-keys -X cancel
bind -T copy-mode-vi v send-keys -X begin-selection
set -s set-clipboard on
setw -g allow-passthrough on

# Zoom pane
bind-key -n M-m resize-pane -Z

# Window navigation
bind-key -n M-u previous-window
bind-key -n M-i next-window
bind-key -n M-y swap-window -t -1\; select-window -t -1
bind-key -n M-o swap-window -t +1\; select-window -t +1

# Quick detach (dismisses Claude popup or detaches from tmux)
bind-key -n C-q detach-client

# URL search
bind-key -n M-/ copy-mode \; send-keys -X search-backward '(https?://|git@|git://|ssh://|ftp://|file:///)[[:alnum:]?=%/_.:,;~@!#$&()*+-]*'

# Status bar
set -g status-position bottom
set -g status-style fg=colour137,bg=colour234,dim
set -g status-left ''
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20
setw -g window-status-current-style fg=colour81,bg=colour238,bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50] '
setw -g window-status-style fg=colour138,bg=colour235
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244] '
setw -g window-status-bell-style fg=colour255,bg=colour1,bold

# Claude Code popup (persistent per-directory session)
bind C-c run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5 -q | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "env -u CLAUDECODE claude"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'

# Initialize TPM (MUST be at the bottom)
run '~/.tmux/plugins/tpm/tpm'
